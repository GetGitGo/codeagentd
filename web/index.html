<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>codeagentd · Chat 测试</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #171b26;
      --sidebar: #13161f;
      --border: #2a3142;
      --text: #e8ecf4;
      --muted: #8b95a8;
      --accent: #5b9fd4;
      --ok: #6bcf8e;
      --err: #f07178;
      --user-bg: #1a2030;
      --sidebar-w: 280px;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      font-family: "SF Pro Text", "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
    }
    .app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    .sidebar {
      flex-shrink: 0;
      width: var(--sidebar-w);
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .sidebar-head {
      padding: 1rem 1rem 0.75rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
    }
    .sidebar-body {
      padding: 1rem;
      flex: 1;
    }
    .main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }
    .main-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.65rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    #sidebarToggle {
      display: none;
      padding: 0.35rem 0.55rem;
      font-size: 1rem;
      line-height: 1;
    }
    label {
      display: block;
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 0.3rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    input, textarea {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.6rem 0.75rem;
      font: inherit;
      font-size: 0.9rem;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    .hint {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.35rem;
      line-height: 1.45;
    }
    .field { margin-bottom: 1rem; }
    button {
      font: inherit;
      font-size: 0.82rem;
      padding: 0.4rem 0.85rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }
    button:hover:not(:disabled) { color: var(--text); border-color: var(--accent); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #healthInfo {
      margin-top: 0.5rem;
      padding: 0.6rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: "SF Mono", "Fira Code", ui-monospace, monospace;
      font-size: 0.72rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--muted);
      max-height: 40vh;
      overflow-y: auto;
    }
    #healthInfo:empty { display: none; }
    #healthInfo.ok { color: var(--ok); }
    #healthInfo.err { color: var(--err); }
    .chat {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
      padding: 1rem;
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
    }
    .turn { margin-bottom: 1.25rem; }
    .msg-user {
      font-size: 0.92rem;
      background: var(--user-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.65rem 0.85rem;
      margin-bottom: 0.65rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg-assistant {
      font-family: "SF Mono", "Fira Code", ui-monospace, monospace;
      font-size: 0.82rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      tab-size: 4;
      padding: 0 0.1rem;
    }
    .msg-assistant.streaming { color: var(--muted); }
    .msg-assistant.streaming::after {
      content: "▍";
      color: var(--accent);
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    .msg-assistant.error { color: var(--err); font-family: inherit; }
    .composer-wrap {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      background: var(--panel);
      padding: 0.75rem 1rem 1rem;
    }
    .composer {
      display: flex;
      align-items: flex-end;
      gap: 0.5rem;
      max-width: 820px;
      margin: 0 auto;
    }
    #question {
      flex: 1;
      min-width: 0;
      resize: none;
      min-height: 2.75rem;
      max-height: 40vh;
      line-height: 1.5;
      border-radius: 10px;
    }
    .composer-actions {
      flex-shrink: 0;
      display: flex;
      flex-direction: row;
      align-items: flex-end;
      gap: 0.4rem;
      padding-bottom: 0.15rem;
    }
    .composer-actions button { white-space: nowrap; }
    @media (max-width: 720px) {
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        z-index: 20;
        transform: translateX(-100%);
        transition: transform 0.2s ease;
        box-shadow: 4px 0 24px rgba(0,0,0,0.4);
      }
      .sidebar.open { transform: translateX(0); }
      #sidebarToggle { display: inline-block; }
      .sidebar-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.45);
        z-index: 15;
      }
      .sidebar-backdrop.show { display: block; }
    }
  </style>
</head>
<body>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">Settings</div>
      <div class="sidebar-body">
        <div class="field">
          <label for="remoteHost">Server IP</label>
          <input id="remoteHost" type="text" />
        </div>
        <div class="field">
          <button type="button" id="healthBtn">健康检查</button>
          <button type="button" id="restartBtn" hidden style="margin-top: 0.4rem">重启服务</button>
          <div id="healthInfo"></div>
        </div>
      </div>
    </aside>

    <div class="main">
      <header class="main-header">
        <button type="button" id="sidebarToggle" title="Settings">☰</button>
      </header>

      <div class="chat" id="output"></div>

      <div class="composer-wrap">
        <div class="composer">
          <textarea id="question" rows="2" placeholder="例如：encoder.cpp 主要做什么？"></textarea>
          <div class="composer-actions">
            <button type="button" id="copyBtn" disabled>Copy</button>
            <button type="button" id="stopBtn" disabled>停止</button>
            <button type="button" id="clearBtn">清空</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const questionInput = $("question");
    const copyBtn = $("copyBtn");
    const stopBtn = $("stopBtn");
    const clearBtn = $("clearBtn");
    const remoteHostInput = $("remoteHost");
    const healthBtn = $("healthBtn");
    const restartBtn = $("restartBtn");
    const healthInfo = $("healthInfo");
    const output = $("output");
    const sidebar = $("sidebar");
    const sidebarToggle = $("sidebarToggle");
    const sidebarBackdrop = $("sidebarBackdrop");

    const USER_ID = "web";
    const DEFAULT_PORT = 3000;
    const LOCAL_DEFAULT = `http://127.0.0.1:${DEFAULT_PORT}`;
    let abortController = null;
    let busy = false;

    function toggleSidebar(open) {
      const on = open ?? !sidebar.classList.contains("open");
      sidebar.classList.toggle("open", on);
      sidebarBackdrop.classList.toggle("show", on);
    }

    sidebarToggle.addEventListener("click", () => toggleSidebar());
    sidebarBackdrop.addEventListener("click", () => toggleSidebar(false));

    function localDefault() {
      const { protocol, hostname, port } = window.location;
      if (protocol === "http:" || protocol === "https:") {
        const p = port ? `:${port}` : "";
        return `${protocol}//${hostname}${p}`.replace(/\/$/, "");
      }
      return LOCAL_DEFAULT;
    }

    function localPlaceholder() {
      const u = new URL(localDefault());
      return u.port ? `${u.hostname}:${u.port}` : u.hostname;
    }

    remoteHostInput.placeholder = localPlaceholder();

    function base() {
      const remote = remoteHostInput.value.trim();
      if (!remote) return localDefault();
      if (/^https?:\/\//i.test(remote)) return remote.replace(/\/$/, "");
      if (remote.includes(":")) return `http://${remote}`.replace(/\/$/, "");
      return `http://${remote}:${DEFAULT_PORT}`;
    }

    function targetHostname() {
      const remote = remoteHostInput.value.trim();
      if (!remote) return new URL(localDefault()).hostname;
      if (/^https?:\/\//i.test(remote)) return new URL(remote).hostname;
      const host = remote.includes(":") ? remote.slice(0, remote.lastIndexOf(":")) : remote;
      return host.replace(/^\[|\]$/g, "");
    }

    function isLoopbackHost(hostname) {
      const h = (hostname || "").toLowerCase().replace(/^\[|\]$/g, "");
      return h === "localhost" || h === "::1" || h === "0:0:0:0:0:0:0:1" || /^127\./.test(h);
    }

    function updateRestartBtnVisibility() {
      restartBtn.hidden = !isLoopbackHost(targetHostname());
    }

    function formatHealth(data) {
      return [
        `endpoint: ${base()}`,
        `status: ${data.status}`,
        `model: ${data.model}`,
        `source_root: ${data.source_root}`,
        data.compile_db_dir ? `compile_db_dir: ${data.compile_db_dir}` : null,
        `mcp_ready: ${data.mcp_ready}`,
        `tool_count: ${data.tool_count}`,
      ].filter(Boolean).join("\n");
    }

    function scrollChat() {
      output.scrollTop = output.scrollHeight;
    }

    async function waitForHealth(timeoutMs) {
      const deadline = Date.now() + timeoutMs;
      while (Date.now() < deadline) {
        try {
          const res = await fetch(`${base()}/health`);
          if (res.ok) return;
        } catch (_) { /* service down while restarting */ }
        await new Promise((r) => setTimeout(r, 1000));
      }
      throw new Error("等待服务恢复超时");
    }

    async function restartServer() {
      if (!confirm("重启 codeagentd？进行中的对话将中断。")) return;
      restartBtn.disabled = true;
      healthBtn.disabled = true;
      healthInfo.className = "";
      healthInfo.textContent = "正在重启…";
      try {
        const res = await fetch(`${base()}/api/restart`, { method: "POST" });
        if (!res.ok) {
          const body = await res.text().catch(() => "");
          throw new Error(body || `HTTP ${res.status}`);
        }
        await waitForHealth(90000);
        await checkHealth();
      } catch (e) {
        healthInfo.className = "err";
        healthInfo.textContent = `重启失败: ${e.message || e}`;
      } finally {
        restartBtn.disabled = false;
        healthBtn.disabled = false;
      }
    }

    async function checkHealth() {
      healthBtn.disabled = true;
      healthInfo.className = "";
      healthInfo.textContent = "…";
      try {
        const res = await fetch(`${base()}/health`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        healthInfo.className = "ok";
        healthInfo.textContent = formatHealth(data);
      } catch (e) {
        healthInfo.className = "err";
        healthInfo.textContent = `连接失败 (${base()}): ${e.message || e}`;
      } finally {
        healthBtn.disabled = false;
      }
    }

    /** SSE: axum 会把 payload 里的 \\n 拆成多行 data:，须用 \\n 拼回（见 axum Event::data） */
    function parseSseChunk(buffer) {
      const events = [];
      const parts = buffer.split("\n\n");
      const rest = parts.pop() ?? "";
      for (const part of parts) {
        if (!part.trim()) continue;
        const dataLines = [];
        for (const line of part.split("\n")) {
          if (line.startsWith("data:")) {
            dataLines.push(line.slice(5).replace(/^\s/, ""));
          }
        }
        if (dataLines.length > 0) events.push(dataLines.join("\n"));
      }
      return { events, rest };
    }

    async function streamChat(question, onChunk, signal) {
      const res = await fetch(`${base()}/api/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_id: USER_ID, question }),
        signal,
      });
      if (!res.ok) {
        const text = await res.text().catch(() => "");
        throw new Error(`HTTP ${res.status}${text ? ": " + text : ""}`);
      }
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const { events, rest } = parseSseChunk(buffer);
        buffer = rest;
        for (const chunk of events) onChunk(chunk);
      }
      if (buffer.trim()) {
        const { events } = parseSseChunk(buffer + "\n\n");
        for (const chunk of events) onChunk(chunk);
      }
    }

    function showReply(el, text, streaming) {
      el.className = streaming ? "msg-assistant streaming" : "msg-assistant";
      el.textContent = text;
    }

    function setBusy(on) {
      busy = on;
      questionInput.disabled = on;
      stopBtn.disabled = !on;
    }

    function updateCopyBtn() {
      copyBtn.disabled = output.querySelectorAll(".turn").length === 0;
    }

    function lastTurnText() {
      const turns = output.querySelectorAll(".turn");
      if (turns.length === 0) return null;
      const turn = turns[turns.length - 1];
      const q = turn.querySelector(".msg-user")?.textContent ?? "";
      const a = turn.querySelector(".msg-assistant")?.textContent ?? "";
      return `【问题】\n${q}\n\n【回答】\n${a}`;
    }

    async function copyLastTurn() {
      const text = lastTurnText();
      if (!text) return;
      try {
        await navigator.clipboard.writeText(text);
        const label = copyBtn.textContent;
        copyBtn.textContent = "已复制";
        setTimeout(() => { copyBtn.textContent = label; }, 1200);
      } catch (e) {
        copyBtn.textContent = "失败";
        setTimeout(() => { copyBtn.textContent = "Copy"; }, 1200);
      }
    }

    async function send() {
      if (busy) return;
      const question = questionInput.value.trim();
      if (!question) return;


      const turn = document.createElement("div");
      turn.className = "turn";
      const userEl = document.createElement("div");
      userEl.className = "msg-user";
      userEl.textContent = question;
      const replyEl = document.createElement("div");
      replyEl.className = "msg-assistant";
      turn.appendChild(userEl);
      turn.appendChild(replyEl);
      output.appendChild(turn);
      updateCopyBtn();

      questionInput.value = "";
      questionInput.style.height = "auto";
      scrollChat();

      setBusy(true);
      abortController = new AbortController();
      let text = "";

      try {
        await streamChat(
          question,
          (chunk) => {
            text += chunk;
            showReply(replyEl, text, true);
            scrollChat();
          },
          abortController.signal
        );
        showReply(replyEl, text, false);
        scrollChat();
      } catch (e) {
        if (e.name === "AbortError") {
          showReply(replyEl, text + (text ? "\n\n" : "") + "[已停止]", false);
        } else {
          replyEl.className = "msg-assistant error";
          replyEl.textContent = `错误: ${e.message || e}`;
        }
      } finally {
        setBusy(false);
        abortController = null;
        questionInput.focus();
      }
    }

    healthBtn.addEventListener("click", checkHealth);
    restartBtn.addEventListener("click", restartServer);
    remoteHostInput.addEventListener("input", updateRestartBtnVisibility);
    updateRestartBtnVisibility();
    copyBtn.addEventListener("click", () => copyLastTurn());
    stopBtn.addEventListener("click", () => abortController?.abort());
    clearBtn.addEventListener("click", () => {
      output.innerHTML = '';
      updateCopyBtn();
    });
    questionInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });
    questionInput.addEventListener("input", () => {
      questionInput.style.height = "auto";
      questionInput.style.height = `${questionInput.scrollHeight}px`;
    });

    questionInput.focus();
  </script>
</body>
</html>
